		<!-- Analytics - Lazy Loaded para performance -->
		<script>
		// Lazy load GTM e Pinterest apos interacao do usuario ou 3s de idle
		// Reduz TBT (Total Blocking Time) significativamente
		(function() {
			var host = globalThis.location.hostname || '';
			var isLocalRuntime = host === 'localhost' || host === '127.0.0.1' || host === '::1' || globalThis.location.protocol === 'file:';
			if (isLocalRuntime) return;

			var gtmLoaded = false;
			var pinterestLoaded = false;

			function loadGTM() {
				if (gtmLoaded) return;
				gtmLoaded = true;

				globalThis.dataLayer = globalThis.dataLayer || [];
				globalThis.dataLayer.push({'gtm.start': Date.now(), event: 'gtm.js'});
				var f = document.getElementsByTagName('script')[0];
				var j = document.createElement('script');
				j.async = true;
				j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-PT885HFQ';
				f.parentNode.insertBefore(j, f);
			}

			function loadPinterest() {
				if (pinterestLoaded) return;
				pinterestLoaded = true;

				if (!globalThis.pintrk) {
					globalThis.pintrk = function() {
						globalThis.pintrk.queue.push(Array.prototype.slice.call(arguments));
					};
					globalThis.pintrk.queue = [];
					globalThis.pintrk.version = "3.0";
				}
				var t = document.createElement("script");
				t.async = true;
				t.src = "https://s.pinimg.com/ct/core.js";
				t.onload = function() {
					globalThis.pintrk('load', '2612738255823');
					globalThis.pintrk('page');
				};
				document.head.appendChild(t);
			}

			function loadAllTrackers() {
				loadGTM();
				loadPinterest();
			}

			// Carregar apos interacao do usuario
			var events = ['scroll', 'click', 'touchstart', 'mousemove', 'keydown'];
			var loadOnce = function() {
				loadAllTrackers();
				events.forEach(function(e) { globalThis.removeEventListener(e, loadOnce); });
			};
			events.forEach(function(e) { globalThis.addEventListener(e, loadOnce, { once: true, passive: true }); });

			// Carregar trackers somente apos interacao real do usuario
		})();
		</script>
